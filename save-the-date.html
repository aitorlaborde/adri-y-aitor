<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date — Adriana & Aitor</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%; width:100%;
    background:#1a1814;
    display:flex; align-items:center; justify-content:center;
    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow:hidden;
  }

  /* ── CARD ── */
  .card {
    position:relative;
    width: min(92vw, 420px);
    aspect-ratio: 3/4;
    overflow:hidden;
    box-shadow: 0 40px 80px -20px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.06);
  }

  /* ── BACKGROUND — Venice watercolor ── */
  .bg {
    position:absolute; inset:-8%;
    width:116%; height:116%;
    background: url('img/venise.jpeg') center 30% / cover no-repeat;
    animation: kenburns 20s ease-in-out infinite alternate;
    will-change: transform;
  }
  @keyframes kenburns {
    0%   { transform: scale(1.00) translate(0, 0); }
    100% { transform: scale(1.10) translate(-2%, 1.5%); }
  }

  /* ── OVERLAYS ── */
  /* Gradient: haut transparent → bas sombre */
  .overlay-top {
    position:absolute; inset:0;
    background: linear-gradient(
      180deg,
      rgba(20,18,14,.15)  0%,
      rgba(20,18,14,.0)  30%,
      rgba(20,18,14,.0)  55%,
      rgba(20,18,14,.75) 85%,
      rgba(20,18,14,.92) 100%
    );
    z-index:2;
  }
  /* Voile crème très léger sur le haut pour lire le texte */
  .overlay-cream {
    position:absolute; inset:0;
    background: linear-gradient(
      180deg,
      rgba(245,238,225,.55) 0%,
      rgba(245,238,225,.30) 40%,
      rgba(245,238,225,.0)  65%
    );
    z-index:3;
  }

  /* ── PARTICULES ── */
  .particles { position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden; }
  .p {
    position:absolute;
    border-radius:50%;
    opacity:0;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform:translateY(110%) translateX(0) rotate(0deg); opacity:0; }
    8%   { opacity:.6; }
    90%  { opacity:.25; }
    100% { transform:translateY(-20%) translateX(30px) rotate(180deg); opacity:0; }
  }

  /* ── CONTENU ── */
  .content {
    position:absolute; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:space-between;
    padding: 9% 8% 10%;
    text-align:center;
  }

  /* Bloc haut */
  .top-block {
    display:flex; flex-direction:column; align-items:center; gap:0;
    opacity:0; animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .3s forwards;
  }

  .logo-img {
    width: clamp(70px, 18vw, 90px);
    height:auto;
    mix-blend-mode: multiply;
    opacity:.75;
    margin-bottom:1.2rem;
  }

  .save-label {
    font-size: clamp(9px, 2.2vw, 12px);
    letter-spacing:.45em; text-transform:uppercase;
    color:#3d3220; font-weight:300;
    margin-bottom:.6rem;
    text-shadow: 0 1px 8px rgba(255,255,255,.7);
  }

  .the-date {
    font-size: clamp(9px, 2vw, 11px);
    letter-spacing:.35em; text-transform:uppercase;
    color:#3d3220; font-weight:200;
    text-shadow: 0 1px 8px rgba(255,255,255,.7);
  }

  /* Bloc central — noms */
  .mid-block {
    display:flex; flex-direction:column; align-items:center;
    opacity:0; animation: fadeUp .9s cubic-bezier(.22,1,.36,1) .7s forwards;
  }

  .line-ornament {
    width:38px; height:1px;
    background:rgba(255,255,255,.5);
    margin-bottom:1.2rem;
    position:relative;
  }
  .line-ornament::before, .line-ornament::after {
    content:''; position:absolute; top:50%;
    width:4px; height:4px; border-radius:50%;
    background:rgba(255,255,255,.55);
    transform:translateY(-50%);
  }
  .line-ornament::before { left:-8px; }
  .line-ornament::after  { right:-8px; }

  .names {
    font-size: clamp(34px, 9vw, 52px);
    font-weight:100; letter-spacing:.06em;
    color:#fff;
    line-height:1.15;
    text-shadow: 0 2px 24px rgba(0,0,0,.35), 0 1px 4px rgba(0,0,0,.2);
  }
  .names .amp {
    font-weight:200; opacity:.6; font-size:.8em;
    display:block; margin:.1em 0;
    letter-spacing:.15em;
  }

  .line-ornament-2 {
    width:28px; height:1px;
    background:rgba(255,255,255,.4);
    margin-top:1.2rem;
  }

  /* Bloc bas */
  .bottom-block {
    display:flex; flex-direction:column; align-items:center; gap:.5rem;
    opacity:0; animation: fadeUp .9s cubic-bezier(.22,1,.36,1) 1.1s forwards;
  }

  .maries-img {
    width: clamp(70px, 18vw, 88px);
    height:auto;
    margin-bottom:.6rem;
    filter: brightness(0) invert(1);
    opacity:.5;
  }

  .date-line {
    font-size: clamp(14px, 3.6vw, 18px);
    font-weight:200; letter-spacing:.18em;
    color:#fff;
    text-shadow: 0 1px 8px rgba(0,0,0,.4);
  }
  .date-sep { opacity:.45; padding:0 .3em; }

  .place-line {
    font-size: clamp(10px, 2.4vw, 13px);
    font-weight:300; letter-spacing:.32em; text-transform:uppercase;
    color:rgba(255,255,255,.6);
    text-shadow: 0 1px 6px rgba(0,0,0,.35);
  }

  .bottom-note {
    margin-top:.8rem;
    font-size: clamp(8px, 1.9vw, 10px);
    letter-spacing:.24em; text-transform:uppercase;
    color:rgba(255,255,255,.35); font-weight:300;
  }

  /* ── CADRE DÉCORATIF ── */
  .frame {
    position:absolute; inset:5%;
    border:1px solid rgba(255,255,255,.12);
    z-index:9; pointer-events:none;
  }
  .frame::before {
    content:''; position:absolute; inset:6px;
    border:1px solid rgba(255,255,255,.06);
  }
  /* Coins */
  .corner {
    position:absolute; width:16px; height:16px;
    z-index:11; pointer-events:none;
  }
  .corner svg { width:100%; height:100%; }
  .corner-tl { top:5%; left:5%; }
  .corner-tr { top:5%; right:5%; transform:scaleX(-1); }
  .corner-bl { bottom:5%; left:5%; transform:scaleY(-1); }
  .corner-br { bottom:5%; right:5%; transform:scale(-1); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── HALO SHIMMER SUR LES NOMS ── */
  @keyframes shimmer {
    0%,100% { text-shadow: 0 2px 24px rgba(0,0,0,.35), 0 1px 4px rgba(0,0,0,.2); }
    50%     { text-shadow: 0 2px 32px rgba(0,0,0,.25), 0 0 40px rgba(255,245,220,.12); }
  }
  .names { animation: shimmer 6s ease-in-out 2s infinite; }

  /* Fond sombre page */
  body::before {
    content:'';
    position:fixed; inset:0;
    background:radial-gradient(ellipse 80% 60% at 50% 50%, #2a241c 0%, #0f0d0a 100%);
    z-index:-1;
  }
</style>
</head>
<body>

<div class="card">
  <!-- Background animé -->
  <div class="bg"></div>

  <!-- Overlays -->
  <div class="overlay-cream"></div>
  <div class="overlay-top"></div>

  <!-- Particules flottantes -->
  <div class="particles" id="ptcl"></div>

  <!-- Cadre décoratif -->
  <div class="frame"></div>

  <!-- Coins ornementaux -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 18 L2 2 L18 2" stroke="rgba(255,255,255,.35)" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,.25)"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 18 L2 2 L18 2" stroke="rgba(255,255,255,.35)" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,.25)"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 18 L2 2 L18 2" stroke="rgba(255,255,255,.35)" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,.25)"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 18 L2 2 L18 2" stroke="rgba(255,255,255,.35)" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="2" fill="rgba(255,255,255,.25)"/>
    </svg>
  </div>

  <!-- Contenu -->
  <div class="content">

    <!-- Haut : logo + "Save the Date" -->
    <div class="top-block">
      <img class="logo-img" src="img/logo.png" alt="AA">
      <p class="save-label">Save the Date</p>
      <p class="the-date">06 · 03 · 2027</p>
    </div>

    <!-- Centre : noms -->
    <div class="mid-block">
      <div class="line-ornament"></div>
      <div class="names">
        Adriana
        <span class="amp">&amp;</span>
        Aitor
      </div>
      <div class="line-ornament-2"></div>
    </div>

    <!-- Bas : mariés + lieu -->
    <div class="bottom-block">
      <img class="maries-img" src="img/maries.png" alt="">
      <p class="date-line">
        Sábado <span class="date-sep">·</span> 6 de marzo de 2027
      </p>
      <p class="place-line">Madrid &nbsp;·&nbsp; España</p>
      <p class="bottom-note">Invitación formal próximamente</p>
    </div>

  </div>
</div>

<script>
// ── Particules légères (lucioles / pétales) ──
(function(){
  const c = document.getElementById('ptcl');
  const N = 18;
  const colors = [
    'rgba(255,240,200,.55)',
    'rgba(255,220,180,.45)',
    'rgba(200,230,200,.4)',
    'rgba(255,255,255,.5)'
  ];
  for(let i=0;i<N;i++){
    const p = document.createElement('div');
    p.className = 'p';
    const size = 3 + Math.random()*5;
    const left = 5 + Math.random()*90;
    const dur  = 8 + Math.random()*12;
    const delay= Math.random()*-20;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    c.appendChild(p);
  }
})();
</script>

</body>
</html>
