<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save the Date — Adriana & Aitor</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%; width:100%;
    background:#e8e2d8;
    display:flex; align-items:center; justify-content:center;
    font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow:hidden;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 100% 100% at 50% 40%, #d6cfc3 0%, #bfb8ac 100%);
    z-index:-1;
  }

  /* ── CARD ── */
  .card {
    position:relative;
    width: min(96vw, 680px);
    aspect-ratio: 4/3;
    overflow:hidden;
    box-shadow:
      0 2px 0 rgba(255,255,255,.7),
      0 30px 60px rgba(0,0,0,.22),
      0 60px 100px rgba(0,0,0,.12);
  }

  /* ── SCÈNE SVG (pleine taille) ── */
  #scene {
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }

  /* ── COUCHE TEXTE ── */
  .text-layer {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    padding:0 8% 6%;
    pointer-events:none;
    text-align:center;
  }

  /* bloc du bas: noms + date */
  .text-bottom {
    opacity:0;
    animation: fadeUp 1s cubic-bezier(.22,1,.36,1) .6s forwards;
  }

  .std-label {
    font-size: clamp(8px, 1.6vw, 11px);
    letter-spacing:.5em; text-transform:uppercase;
    color:rgba(40,32,22,.55); font-weight:300;
    margin-bottom:.5rem;
  }

  .couple-names {
    font-size: clamp(26px, 5.8vw, 46px);
    font-weight:100; letter-spacing:.08em;
    color:#2a2016;
    line-height:1;
    text-shadow: 0 1px 12px rgba(255,255,255,.6);
  }
  .couple-names .amp {
    font-weight:200; opacity:.5;
    letter-spacing:.2em; font-size:.75em;
    display:inline-block; margin:0 .15em;
  }

  .date-row {
    margin-top:.6rem;
    font-size: clamp(9px, 1.8vw, 13px);
    font-weight:300; letter-spacing:.3em; text-transform:uppercase;
    color:rgba(40,32,22,.6);
  }
  .date-sep { opacity:.4; padding:0 .2em; }

  .place-row {
    margin-top:.25rem;
    font-size: clamp(8px, 1.5vw, 11px);
    font-weight:200; letter-spacing:.45em; text-transform:uppercase;
    color:rgba(40,32,22,.45);
  }

  .formal-note {
    margin-top:.8rem;
    font-size: clamp(7px, 1.3vw, 9px);
    letter-spacing:.28em; text-transform:uppercase;
    color:rgba(40,32,22,.32); font-weight:300;
  }

  /* Logo haut */
  .logo-layer {
    position:absolute; top:5%; left:50%; transform:translateX(-50%);
    z-index:20; text-align:center;
    opacity:0; animation: fadeDown .9s cubic-bezier(.22,1,.36,1) .2s forwards;
  }
  .logo-layer img {
    width:clamp(48px, 10vw, 72px);
    height:auto;
    mix-blend-mode:multiply;
    opacity:.65;
  }

  /* ── PETITS OISEAUX SVG ── */
  .birds {
    position:absolute; top:8%; left:0; right:0;
    z-index:15; pointer-events:none;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity:0; transform:translateX(-50%) translateY(-10px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
  @keyframes birdfly {
    0%   { transform:translate(0,0); }
    25%  { transform:translate(6px,-4px); }
    50%  { transform:translate(12px,0); }
    75%  { transform:translate(18px,-3px); }
    100% { transform:translate(24px,0); }
  }

  /* Cadre effet papier */
  .paper-frame {
    position:absolute; inset:0; z-index:25; pointer-events:none;
    box-shadow:inset 0 0 0 1px rgba(180,165,140,.4), inset 0 0 30px rgba(0,0,0,.06);
  }
  .paper-frame::before {
    content:''; position:absolute; inset:8px;
    border:1px solid rgba(180,165,140,.2);
  }
</style>
</head>
<body>

<div class="card">

  <!-- ── SCÈNE ANIMÉE (SVG) ── -->
  <svg id="scene" viewBox="0 0 640 480" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg">
    <defs>

      <!-- VENT ARBRES : déplacement doux latéral + vertical -->
      <filter id="wind-left" x="-30%" y="-25%" width="160%" height="150%">
        <feTurbulence type="fractalNoise"
          baseFrequency="0.008 0.014"
          numOctaves="4" seed="2" result="turb">
          <animate attributeName="seed"
            values="2;40;18;55;2"
            dur="6s" repeatCount="indefinite" calcMode="linear"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb"
          scale="14" xChannelSelector="R" yChannelSelector="G"
          result="displaced"/>
        <!-- Légère saturation pour que les arbres semblent vivants -->
        <feColorMatrix type="saturate" values="1.15" in="displaced"/>
      </filter>

      <!-- VENT ARBRES DROITE : légèrement décalé dans le temps -->
      <filter id="wind-right" x="-30%" y="-25%" width="160%" height="150%">
        <feTurbulence type="fractalNoise"
          baseFrequency="0.009 0.013"
          numOctaves="4" seed="8" result="turb">
          <animate attributeName="seed"
            values="8;45;22;60;8"
            dur="7s" repeatCount="indefinite" calcMode="linear"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb"
          scale="13" xChannelSelector="R" yChannelSelector="G"
          result="displaced"/>
        <feColorMatrix type="saturate" values="1.15" in="displaced"/>
      </filter>

      <!-- FLEURS : ondulation plus rapide, plus horizontale -->
      <filter id="wind-flowers" x="-8%" y="-15%" width="116%" height="130%">
        <feTurbulence type="turbulence"
          baseFrequency="0.022 0.006"
          numOctaves="3" seed="5" result="turb">
          <animate attributeName="seed"
            values="5;35;15;48;5"
            dur="4s" repeatCount="indefinite" calcMode="linear"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb"
          scale="9" xChannelSelector="R" yChannelSelector="G"/>
      </filter>

      <!-- HERBE : très légère ondulation verte -->
      <filter id="wind-grass" x="-5%" y="-10%" width="110%" height="120%">
        <feTurbulence type="fractalNoise"
          baseFrequency="0.018 0.005"
          numOctaves="2" seed="11" result="turb">
          <animate attributeName="seed"
            values="11;30;11"
            dur="5.5s" repeatCount="indefinite" calcMode="linear"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="turb"
          scale="5" xChannelSelector="R" yChannelSelector="G"/>
      </filter>

      <!-- Clips -->

      <!-- Arbre gauche (3 arbres groupés côté gauche) -->
      <clipPath id="clip-left-tree">
        <rect x="0" y="90" width="200" height="250"/>
      </clipPath>

      <!-- Arbre droit -->
      <clipPath id="clip-right-tree">
        <rect x="478" y="90" width="162" height="250"/>
      </clipPath>

      <!-- Fleurs rouges/roses au centre-bas -->
      <clipPath id="clip-flowers">
        <ellipse cx="320" cy="352" rx="210" ry="68"/>
      </clipPath>

      <!-- Herbe verte des côtés (chemins + bordures) -->
      <clipPath id="clip-grass">
        <rect x="0" y="365" width="640" height="115"/>
      </clipPath>

      <!-- Cache le texte d'anniversaire (bas droite) -->
      <clipPath id="clip-no-text">
        <!-- On réutilise l'image entière SAUF la zone texte -->
        <!-- Géré par un rectangle blanc ci-dessous -->
      </clipPath>

    </defs>

    <!-- ① Image de base (fixe) -->
    <image href="img/alcala.jpeg"
      x="0" y="0" width="640" height="480"
      preserveAspectRatio="xMidYMid slice"/>

    <!-- ② Cache le texte "Feliz Cumpleaños..." bas droite -->
    <ellipse cx="535" cy="428" rx="118" ry="52"
      fill="rgba(225,218,200,0.96)"/>

    <!-- ③ Arbre GAUCHE — animé vent -->
    <image href="img/alcala.jpeg"
      x="0" y="0" width="640" height="480"
      clip-path="url(#clip-left-tree)"
      filter="url(#wind-left)"
      preserveAspectRatio="xMidYMid slice"/>

    <!-- ④ Arbre DROIT — animé vent (décalé) -->
    <image href="img/alcala.jpeg"
      x="0" y="0" width="640" height="480"
      clip-path="url(#clip-right-tree)"
      filter="url(#wind-right)"
      preserveAspectRatio="xMidYMid slice"/>

    <!-- ⑤ FLEURS — ondulation douce -->
    <image href="img/alcala.jpeg"
      x="0" y="0" width="640" height="480"
      clip-path="url(#clip-flowers)"
      filter="url(#wind-flowers)"
      preserveAspectRatio="xMidYMid slice"/>

    <!-- ⑥ HERBE — très légère -->
    <image href="img/alcala.jpeg"
      x="0" y="0" width="640" height="480"
      clip-path="url(#clip-grass)"
      filter="url(#wind-grass)"
      preserveAspectRatio="xMidYMid slice"/>

    <!-- ⑦ Gradient bas (cache texte anniversaire + lisibilité texte) -->
    <defs>
      <linearGradient id="grad-bottom" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#f0e8d8" stop-opacity="0"/>
        <stop offset="60%"  stop-color="#f0e8d8" stop-opacity="0"/>
        <stop offset="82%"  stop-color="#ede5d5" stop-opacity="0.72"/>
        <stop offset="100%" stop-color="#e8dfcb" stop-opacity="0.95"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="640" height="480" fill="url(#grad-bottom)"/>

    <!-- ⑧ Petits oiseaux (animés, dans le ciel) -->
    <g opacity=".55">
      <!-- Oiseau 1 -->
      <g transform="translate(145, 58)">
        <animateTransform attributeName="transform" type="translate"
          values="145,58; 158,52; 172,56; 185,50"
          dur="8s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
        <path d="M-6,0 Q0,-5 6,0" fill="none" stroke="#5a7080" stroke-width="1.3" stroke-linecap="round"/>
      </g>
      <!-- Oiseau 2 -->
      <g transform="translate(118, 42)">
        <animateTransform attributeName="transform" type="translate"
          values="118,42; 130,37; 144,41; 158,36"
          dur="10s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
        <path d="M-5,0 Q0,-4 5,0" fill="none" stroke="#5a7080" stroke-width="1.1" stroke-linecap="round"/>
      </g>
    </g>

  </svg>

  <!-- ── LOGO (haut, au-dessus du SVG) ── -->
  <div class="logo-layer">
    <img src="img/logo.png" alt="AA">
  </div>

  <!-- ── TEXTE ── -->
  <div class="text-layer">
    <div class="text-bottom">
      <p class="std-label">Save the Date</p>
      <p class="couple-names">
        Adriana <span class="amp">&amp;</span> Aitor
      </p>
      <p class="date-row">
        Sábado <span class="date-sep">·</span>
        6 de marzo de 2027
      </p>
      <p class="place-row">Madrid &nbsp;·&nbsp; España</p>
      <p class="formal-note">Invitación formal próximamente</p>
    </div>
  </div>

  <!-- Cadre papier -->
  <div class="paper-frame"></div>

</div>

</body>
</html>
